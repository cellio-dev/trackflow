<!doctype html>
<html lang="en" class="app-layout">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0E17" />
    <link rel="stylesheet" href="/src/css/app-shell.css" />
    <title>My Jukebox · TrackFlow</title>
    <style>
      .container {
        box-sizing: border-box;
        width: 100%;
        margin: 0;
        padding: 24px 16px 48px;
      }

      @media (min-width: 640px) {
        .container {
          padding-left: 24px;
          padding-right: 24px;
        }
      }

      @media (min-width: 1024px) {
        .container {
          padding-left: 32px;
          padding-right: 32px;
        }
      }

      .jb-wrap {
        box-sizing: border-box;
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
        padding: 0;
      }
      .jb-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px 16px;
        margin-bottom: 20px;
      }
      .jb-header h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        flex: 1 1 auto;
      }
      .jb-status {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid #3f3f46;
        background: #18181b;
        color: #a1a1aa;
      }
      .jb-status[data-status='active'] {
        color: #86efac;
        border-color: #166534;
        background: #14532d;
      }
      .jb-err {
        color: #f87171;
        font-size: 14px;
        margin: 0 0 16px;
      }
      .jb-card {
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 14px;
      }
      .jb-card h2 {
        margin: 0 0 12px;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #71717a;
      }
      .jb-np {
        display: flex;
        gap: 14px;
        align-items: center;
        margin-bottom: 16px;
      }
      .jb-np img {
        width: 72px;
        height: 72px;
        border-radius: 10px;
        object-fit: cover;
        background: #27272a;
        flex-shrink: 0;
      }
      .jb-np-meta {
        min-width: 0;
      }
      .jb-np-meta .t {
        font-weight: 600;
        font-size: 1rem;
        line-height: 1.25;
      }
      .jb-np-meta .a {
        font-size: 0.88rem;
        color: #a1a1aa;
        margin-top: 4px;
      }
      .jb-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .jb-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        border: 1px solid #3f3f46;
        background: #27272a;
        color: #fafafa;
        cursor: pointer;
        font-family: inherit;
      }
      .jb-btn:hover {
        background: #3f3f46;
      }
      .jb-btn--primary {
        background: #fafafa;
        color: #18181b;
        border-color: #fafafa;
      }
      .jb-btn--primary:hover {
        background: #e4e4e7;
        border-color: #e4e4e7;
      }
      .jb-btn--ghost {
        background: transparent;
      }
      .jb-util .jb-btn {
        width: 100%;
      }
      .jb-util .jb-btn + .jb-btn {
        margin-top: 10px;
      }
      dialog.jb-modal {
        border: 1px solid #3f3f46;
        border-radius: 12px;
        background: #18181b;
        color: #fafafa;
        padding: 20px;
        max-width: 400px;
      }
      dialog.jb-modal::backdrop {
        background: rgba(0, 0, 0, 0.55);
      }
      .jb-modal p {
        margin: 0 0 16px;
        color: #d4d4d8;
        font-size: 15px;
      }
      .jb-modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
    </style>
  </head>
  <body class="app-layout">
    <div class="app-shell">
      <aside class="app-sidebar" aria-label="Main navigation">
        <a href="/index.html" class="app-sidebar__brand" aria-label="TrackFlow home">
          <img class="app-sidebar__logo" src="/trackflow-logo.svg" width="384" height="60" alt="" decoding="async" />
        </a>
        <nav class="app-sidebar__nav">
          <a href="/index.html" class="app-nav-item" aria-label="Discover">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="app-nav-item__label">Discover</span>
          </a>
          <a href="/following.html" class="app-nav-item" aria-label="Following">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
            <span class="app-nav-item__label">Following</span>
          </a>
          <a href="/requests.html" class="app-nav-item" aria-label="Requests">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/><path d="M9 12h6"/><path d="M9 16h6"/></svg>
            <span class="app-nav-item__label">Requests</span>
          </a>
          <a href="/jukebox.html" class="app-nav-item app-nav-item--active" aria-current="page" aria-label="Jukebox">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            <span class="app-nav-item__label">Jukebox</span>
          </a>
          <a href="/settings.html" class="app-nav-item" aria-label="Settings" hidden>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span class="app-nav-item__label">Settings</span>
          </a>
        </nav>
      </aside>
      <main class="app-main">
        <div class="container">
          <div class="search-row" data-app-top-search>
            <div class="search-field">
              <span class="search-field__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              </span>
              <input type="text" placeholder="Search artists, albums, tracks &amp; playlists" aria-label="Search" />
            </div>
          </div>
          <div class="jb-wrap">
          <header class="jb-header">
            <h1>My Jukebox</h1>
            <span id="jbStatus" class="jb-status" data-status="idle" aria-live="polite">Idle</span>
          </header>
          <p id="jbErr" class="jb-err" hidden></p>

          <div id="jbPanel">
            <section class="jb-card" aria-labelledby="jbMainHeading">
              <h2 id="jbMainHeading">Now playing</h2>
              <div class="jb-np">
                <img id="jbNpArt" src="" width="72" height="72" alt="" decoding="async" />
                <div class="jb-np-meta">
                  <div id="jbNpTitle" class="t">Loading…</div>
                  <div id="jbNpArtist" class="a">Setting up your jukebox</div>
                </div>
              </div>
              <h2 class="visually-hidden" id="jbPrimaryHeading">Primary actions</h2>
              <div class="jb-actions" aria-labelledby="jbPrimaryHeading">
                <button type="button" class="jb-btn jb-btn--primary" id="jbBtnLaunch" title="Open guest player">Launch</button>
                <button type="button" class="jb-btn jb-btn--primary" id="jbBtnControl" title="Open host queue">Control Panel</button>
              </div>
            </section>

            <section class="jb-card jb-util" aria-labelledby="jbOptionsHeading">
              <h2 id="jbOptionsHeading">Options</h2>
              <button type="button" class="jb-btn jb-btn--ghost" id="jbBtnEdit">Edit settings</button>
              <button type="button" class="jb-btn jb-btn--ghost" id="jbBtnClearHist" title="Remove jukebox play history">
                Clear play history
              </button>
            </section>
          </div>
          </div>
        </div>
      </main>
    </div>

    <dialog id="jbClearDialog" class="jb-modal" aria-labelledby="jbClearTitle">
      <h3 id="jbClearTitle" style="margin: 0 0 12px; font-size: 1.1rem">Clear play history?</h3>
      <p>This removes all jukebox play history used for discovery (Top Tracks / Recent Mix). It does not delete your library.</p>
      <div class="jb-modal-actions">
        <button type="button" class="jb-btn" id="jbClearCancel">Cancel</button>
        <button type="button" class="jb-btn jb-btn--primary" id="jbClearConfirm">Clear history</button>
      </div>
    </dialog>

    <script type="module" src="/src/pages/jukebox-page.js"></script>
  </body>
</html>
