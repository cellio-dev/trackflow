<!doctype html>
<html lang="en" class="app-layout">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0E17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" sizes="192x192" />
    <meta name="apple-mobile-web-app-title" content="TrackFlow" />
    <link rel="stylesheet" href="/src/css/app-shell.css" />
    <title>TrackFlow - Artist</title>
    <style>
      .container {
        box-sizing: border-box;
        width: 100%;
        margin: 0;
        padding: 32px 16px 32px;
      }

      @media (min-width: 640px) {
        .container {
          padding-left: 24px;
          padding-right: 24px;
        }
      }

      @media (min-width: 1024px) {
        .container {
          padding-left: 32px;
          padding-right: 32px;
        }
      }

      .section-title {
        margin: 24px 0 12px;
        font-size: 1.1rem;
      }

      .section-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin: 24px 0 12px;
      }

      .section-toolbar .section-title {
        margin: 0;
      }

      .albums-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 16px;
        margin-bottom: 8px;
      }

      .album-card {
        position: relative;
        z-index: 0;
        display: block;
        text-align: center;
        text-decoration: none;
        color: #222;
        border-radius: 8px;
        transform: translateY(0) scale(1);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        transition:
          transform 200ms ease,
          box-shadow 200ms ease;
      }

      .album-card:hover {
        z-index: 1;
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.38);
      }

      .album-cover {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 6px;
        background: #eaeaea;
        transition: filter 200ms ease;
        vertical-align: middle;
      }

      .album-card:hover .album-cover {
        filter: brightness(1.05);
      }

      .album-title {
        font-size: 13px;
        margin-top: 8px;
        line-height: 1.3;
      }

      .track-actions {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: flex-end;
        min-width: 118px;
      }

      .top-links {
        margin-bottom: 12px;
      }

      .top-links a {
        color: #0b57d0;
        margin-right: 12px;
      }

      .artist-header {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        margin-bottom: 24px;
      }

      .artist-header-main {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .artist-header-main #followButton {
        align-self: flex-start;
      }

      .artist-cover {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 8px;
        background: #eaeaea;
        flex-shrink: 0;
      }

      .artist-title {
        margin: 0;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body class="app-layout">
    <div class="app-shell">
      <aside class="app-sidebar" aria-label="Main navigation">
        <a href="/index.html" class="app-sidebar__brand" aria-label="TrackFlow home">
          <img class="app-sidebar__logo" src="/trackflow-logo.svg" width="384" height="60" alt="" decoding="async" />
        </a>
        <nav class="app-sidebar__nav">
          <a href="/index.html" class="app-nav-item app-nav-item--active" aria-current="page" aria-label="Discover">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="app-nav-item__label">Discover</span>
          </a>
          <a href="/following.html" class="app-nav-item" aria-label="Following">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
            <span class="app-nav-item__label">Following</span>
          </a>
          <a href="/requests.html" class="app-nav-item" aria-label="Requests">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/><path d="M9 12h6"/><path d="M9 16h6"/></svg>
            <span class="app-nav-item__label">Requests</span>
          </a>
          <a href="/jukebox.html" class="app-nav-item" aria-label="Jukebox">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            <span class="app-nav-item__label">Jukebox</span>
          </a>
          <a href="/settings.html" class="app-nav-item" aria-label="Settings" hidden>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span class="app-nav-item__label">Settings</span>
          </a>
        </nav>
      </aside>
      <main class="app-main">
        <div class="container">
      <div class="search-row" data-app-top-search>
        <div class="search-field">
          <span class="search-field__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </span>
          <input type="text" placeholder="Search artists, albums, tracks &amp; playlists" aria-label="Search" />
        </div>
      </div>
      <div class="top-links">
        <button type="button" class="back-link" aria-label="Back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
      </div>

      <div class="artist-header">
        <img id="artistCover" class="artist-cover" src="" alt="" />
        <div class="artist-header-main">
          <h1 id="artistTitle" class="artist-title">Artist</h1>
          <button id="followButton" type="button">Follow</button>
        </div>
      </div>

      <h2 class="section-title">Albums</h2>
      <div id="albumsGrid" class="albums-grid"></div>

      <div class="section-toolbar">
        <h2 id="tracksSectionHeading" class="section-title">Top 0 Tracks</h2>
        <button id="requestAllBtn" type="button">Request All</button>
      </div>
      <ul id="resultsList"></ul>
        </div>
      </main>
    </div>

    <script type="module" src="/src/pages/artist-page.js"></script>
  </body>
</html>
