<!doctype html>
<html lang="en" class="app-layout">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0E17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" sizes="192x192" />
    <meta name="apple-mobile-web-app-title" content="TrackFlow" />
    <link rel="stylesheet" href="/src/css/app-shell.css" />
    <title>Genre · TrackFlow</title>
    <style>
      .app-main {
        position: relative;
      }

      .genre-page-loading {
        position: absolute;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        background: #09090b;
        color: #e4e4e7;
      }

      .genre-page-loading[hidden] {
        display: none !important;
      }

      .genre-page-loading__text {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
      }

      .container {
        box-sizing: border-box;
        width: 100%;
        margin: 0;
        padding: 32px 16px 32px;
      }

      @media (min-width: 640px) {
        .container {
          padding-left: 24px;
          padding-right: 24px;
        }
      }

      @media (min-width: 1024px) {
        .container {
          padding-left: 32px;
          padding-right: 32px;
        }
      }

      .top-links {
        margin-bottom: 12px;
      }

      .genre-page-title {
        margin: 0 0 6px;
        font-size: 1.35rem;
        font-weight: 700;
      }

      .results-section {
        margin-top: 18px;
      }

      .section-header {
        margin: 0 0 8px;
      }

      .section-header h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      .tracks-scroll-block {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 -2px;
      }

      .tracks-scroll-viewport {
        flex: 1;
        min-width: 0;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-snap-type: x proximity;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }

      .tracks-scroll-nav {
        flex: 0 0 auto;
        width: 38px;
        height: 38px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #c9c9c9;
        border-radius: 50%;
        background: #fff;
        color: #333;
        cursor: pointer;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        transition: background 0.12s ease, border-color 0.12s ease, opacity 0.12s ease;
      }

      .tracks-scroll-nav:hover:not(:disabled) {
        background: #f4f4f4;
        border-color: #b0b0b0;
      }

      .tracks-scroll-nav:disabled {
        opacity: 0.32;
        cursor: default;
        pointer-events: none;
      }

      .tracks-scroll-nav svg {
        display: block;
      }

      .tracks-scroll-row {
        list-style: none;
        padding: 0 0 10px;
        margin: 0;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 12px;
      }

      .tracks-scroll-row__item {
        flex: 0 0 auto;
        scroll-snap-align: start;
      }

      .tracks-scroll-error {
        flex: 1 1 100%;
        min-width: 100%;
        padding: 12px;
        color: #b3261e;
        font-size: 14px;
      }
    </style>
  </head>
  <body class="app-layout">
    <div class="app-shell">
      <aside class="app-sidebar" aria-label="Main navigation">
        <a href="/index.html" class="app-sidebar__brand" aria-label="TrackFlow home">
          <img class="app-sidebar__logo" src="/trackflow-logo.svg" width="384" height="60" alt="" decoding="async" />
        </a>
        <nav class="app-sidebar__nav">
          <a href="/index.html" class="app-nav-item app-nav-item--active" aria-current="page" aria-label="Discover">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="app-nav-item__label">Discover</span>
          </a>
          <a href="/following.html" class="app-nav-item" aria-label="Following">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
            <span class="app-nav-item__label">Following</span>
          </a>
          <a href="/requests.html" class="app-nav-item" aria-label="Requests">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/><path d="M9 12h6"/><path d="M9 16h6"/></svg>
            <span class="app-nav-item__label">Requests</span>
          </a>
          <a href="/jukebox.html" class="app-nav-item" hidden aria-label="Jukebox">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            <span class="app-nav-item__label">Jukebox</span>
          </a>
          <a href="/settings.html" class="app-nav-item" aria-label="Settings" hidden>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span class="app-nav-item__label">Settings</span>
          </a>
        </nav>
      </aside>
      <main class="app-main">
        <div
          id="genrePageLoading"
          class="genre-page-loading"
          role="status"
          aria-live="polite"
          hidden
        >
          <p class="genre-page-loading__text">Loading genre…</p>
        </div>
        <div class="container">
          <div class="search-row" data-app-top-search>
            <div class="search-field">
              <span class="search-field__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              </span>
              <input id="searchInput" type="text" placeholder="Search artists, albums, tracks &amp; playlists" aria-label="Search" />
            </div>
          </div>

          <div class="top-links">
            <button type="button" class="back-link" aria-label="Back">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
          </div>
          <h1 id="genrePageTitle" class="genre-page-title">Genre</h1>

          <div id="genreFeedShell">
            <div id="genreTrendingTracksSection" class="results-section" hidden>
              <div class="section-header">
                <h2>Trending tracks</h2>
              </div>
              <div class="tracks-scroll-block">
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--prev" aria-label="Scroll trending tracks left" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="tracks-scroll-viewport">
                  <ul id="genreTrendingTracksList" class="tracks-scroll-row" role="list"></ul>
                </div>
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--next" aria-label="Scroll trending tracks right" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>

            <div id="genreNewTracksSection" class="results-section" hidden>
              <div class="section-header">
                <h2>New tracks</h2>
              </div>
              <div class="tracks-scroll-block">
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--prev" aria-label="Scroll new tracks left" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="tracks-scroll-viewport">
                  <ul id="genreNewTracksList" class="tracks-scroll-row" role="list"></ul>
                </div>
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--next" aria-label="Scroll new tracks right" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>

            <div id="genreTrendingPlaylistsSection" class="results-section" hidden>
              <div class="section-header">
                <h2>Trending playlists</h2>
              </div>
              <div class="tracks-scroll-block">
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--prev" aria-label="Scroll trending playlists left" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="tracks-scroll-viewport">
                  <ul id="genreTrendingPlaylistsList" class="tracks-scroll-row" role="list"></ul>
                </div>
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--next" aria-label="Scroll trending playlists right" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>

            <div id="genrePopularArtistsSection" class="results-section" hidden>
              <div class="section-header">
                <h2>Popular artists</h2>
              </div>
              <div class="tracks-scroll-block">
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--prev" aria-label="Scroll popular artists left" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="tracks-scroll-viewport">
                  <ul id="genrePopularArtistsList" class="tracks-scroll-row" role="list"></ul>
                </div>
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--next" aria-label="Scroll popular artists right" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>

            <div id="genreNewAlbumsSection" class="results-section" hidden>
              <div class="section-header">
                <h2>New albums</h2>
              </div>
              <div class="tracks-scroll-block">
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--prev" aria-label="Scroll new albums left" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="tracks-scroll-viewport">
                  <ul id="genreNewAlbumsList" class="tracks-scroll-row" role="list"></ul>
                </div>
                <button type="button" class="tracks-scroll-nav tracks-scroll-nav--next" aria-label="Scroll new albums right" disabled>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="/src/pages/genre-page.js"></script>
  </body>
</html>
