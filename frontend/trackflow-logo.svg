<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 60" fill="none" role="img" aria-label="TrackFlow">
  <defs>
    <style type="text/css">
      @import url("https://fonts.googleapis.com/css2?family=Satisfy&amp;display=swap");
      .tf-word {
        font-family: "Satisfy", "Segoe Script", "Brush Script MT", "Snell Roundhand", cursive;
        font-size: 32px;
        font-weight: 400;
        fill: url(#tf-text);
      }
    </style>
    <linearGradient id="tf-wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="tf-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="tf-wave-glow" x="-60%" y="-80%" width="220%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tf-text-glow" x="-8%" y="-20%" width="116%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.35" result="blur"/>
      <feFlood flood-color="#06B6D4" flood-opacity="0.5" result="cyan"/>
      <feComposite in="cyan" in2="blur" operator="in" result="cyanGlow"/>
      <feFlood flood-color="#60A5FA" flood-opacity="0.35" result="blue"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur2"/>
      <feComposite in="blue" in2="blur2" operator="in" result="blueGlow"/>
      <feMerge>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path
    d="M 5 36 C 9 36 11 17 19 23 C 23 26 25 41 33 29 C 37 23 39 14 48 21 C 52 25 54 34 62 36 C 66 37 70 36 76 36"
    stroke="url(#tf-wave)"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#tf-wave-glow)"
  />
  <text class="tf-word" x="84" y="44" filter="url(#tf-text-glow)">TrackFlow</text>
</svg>
