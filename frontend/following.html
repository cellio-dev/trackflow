<!doctype html>
<html lang="en" class="app-layout">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0E17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" sizes="192x192" />
    <meta name="apple-mobile-web-app-title" content="TrackFlow" />
    <link rel="stylesheet" href="/src/css/app-shell.css" />
    <title>Following · TrackFlow</title>
    <style>
      .container {
        box-sizing: border-box;
        width: 100%;
        margin: 0;
        padding: 24px 16px 32px;
      }

      @media (min-width: 640px) {
        .container {
          padding-left: 24px;
          padding-right: 24px;
        }
      }

      @media (min-width: 1024px) {
        .container {
          padding-left: 32px;
          padding-right: 32px;
        }
      }

      .followed-grid {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }

      .followed-item {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .followed-item .search-entity-card {
        text-decoration: none;
        color: inherit;
      }

      .followed-sync {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 12px;
        line-height: 1.35;
        color: #d4d4d8;
        cursor: pointer;
      }

      .followed-sync input {
        margin-top: 2px;
        flex-shrink: 0;
      }

      .followed-empty {
        font-size: 14px;
        color: #a1a1aa;
        margin: 12px 0;
      }

      .followed-page-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px 20px;
        margin: 12px 0 20px;
      }

      .followed-view-toggle {
        display: inline-flex;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        overflow: hidden;
      }

      .followed-view-btn {
        margin: 0;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        border: none;
        background: #18181b;
        color: #a1a1aa;
        cursor: pointer;
        transition: background 0.12s ease, color 0.12s ease;
      }

      .followed-view-btn:hover {
        color: #fafafa;
        background: #27272a;
      }

      .followed-view-btn--active {
        background: #3f3f46;
        color: #fafafa;
      }

      .followed-user-filter--admin-only {
        display: none !important;
      }

      .followed-user-filter--admin-only.is-admin-visible {
        display: flex !important;
        align-items: center;
        gap: 8px;
      }

      .followed-user-filter {
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #d4d4d8;
      }

      .followed-user-filter select {
        min-width: 200px;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #3f3f46;
        background: #18181b;
        color: #fafafa;
        font-size: 13px;
      }

      .followed-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .followed-list-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 14px;
        border: 1px solid #3f3f46;
        border-radius: 10px;
        background: rgba(24, 24, 27, 0.55);
      }

      .followed-list-item__thumb {
        width: 52px;
        height: 52px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
        display: block;
      }

      .followed-list-item__actions {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .followed-list-item__plex-sync-slot {
        width: 42px;
        height: 42px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        background: #18181b;
        pointer-events: none;
      }

      .followed-list-item__plex-sync-slot .search-entity-card__plex-sync-svg {
        display: block;
      }

      .followed-list-item__main {
        flex: 1;
        min-width: 0;
      }

      .followed-list-item__title {
        display: inline-block;
        font-weight: 600;
        font-size: 15px;
        color: #fafafa;
        text-decoration: none;
      }

      .followed-list-item__title:hover {
        text-decoration: underline;
      }

      .followed-list-item__meta {
        font-size: 12px;
        color: #a1a1aa;
        margin-top: 4px;
      }

      .followed-list-unfollow {
        flex-shrink: 0;
        width: 42px;
        height: 42px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        background: #18181b;
        color: #f87171;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease;
      }

      .followed-list-unfollow:hover:not(:disabled) {
        background: #3f1d1d;
        border-color: #b91c1c;
        color: #fecaca;
      }

      .followed-list-unfollow:disabled {
        opacity: 0.45;
        cursor: default;
      }

      /* Grid: playlist secondary line hidden until hover (global --playlist rule), except admin “All users” owner (match artist cards). */
      .followed-item .search-entity-card--playlist.search-entity-card--followed-show-owner .search-entity-card__subtitle:not(:empty) {
        opacity: 1;
      }

      /* Plex badge: stay visible; follow strip still hides until hover (like artist cards). */
      .followed-item .followed-grid-plex-badge {
        position: absolute;
        left: 10px;
        bottom: 10px;
        z-index: 6;
        box-sizing: border-box;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        background: rgba(24, 24, 27, 0.72);
        pointer-events: none;
      }

      .followed-item .followed-grid-plex-badge .search-entity-card__plex-sync-svg {
        display: block;
      }
    </style>
  </head>
  <body class="app-layout">
    <div class="app-shell">
      <aside class="app-sidebar" aria-label="Main navigation">
        <a href="/index.html" class="app-sidebar__brand" aria-label="TrackFlow home">
          <img class="app-sidebar__logo" src="/trackflow-logo.svg" width="384" height="60" alt="" decoding="async" />
        </a>
        <nav class="app-sidebar__nav">
          <a href="/index.html" class="app-nav-item" aria-label="Discover">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="app-nav-item__label">Discover</span>
          </a>
          <a href="/following.html" class="app-nav-item app-nav-item--active" aria-current="page" aria-label="Following">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
            <span class="app-nav-item__label">Following</span>
          </a>
          <a href="/requests.html" class="app-nav-item" aria-label="Requests">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/><path d="M9 12h6"/><path d="M9 16h6"/></svg>
            <span class="app-nav-item__label">Requests</span>
          </a>
          <a href="/jukebox.html" class="app-nav-item" hidden aria-label="Jukebox">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            <span class="app-nav-item__label">Jukebox</span>
          </a>
          <a href="/settings.html" class="app-nav-item" aria-label="Settings" hidden>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span class="app-nav-item__label">Settings</span>
          </a>
        </nav>
      </aside>
      <main class="app-main">
        <div class="container">
          <div class="search-row" data-app-top-search>
            <div class="search-field">
              <span class="search-field__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              </span>
              <input type="text" placeholder="Search artists, albums, tracks &amp; playlists" aria-label="Search" />
            </div>
          </div>
          <h1>Following</h1>
          <div class="followed-page-toolbar" id="followedToolbar">
            <div class="followed-view-toggle" role="group" aria-label="Show">
              <button type="button" class="followed-view-btn followed-view-btn--active" id="followingFilterAll" aria-pressed="true">
                All
              </button>
              <button type="button" class="followed-view-btn" id="followingFilterArtists" aria-pressed="false">
                Artists
              </button>
              <button type="button" class="followed-view-btn" id="followingFilterPlaylists" aria-pressed="false">
                Playlists
              </button>
            </div>
            <div class="followed-view-toggle" role="group" aria-label="Layout">
              <button type="button" class="followed-view-btn followed-view-btn--active" id="followedViewGrid" aria-pressed="true">
                Grid
              </button>
              <button type="button" class="followed-view-btn" id="followedViewList" aria-pressed="false">
                List
              </button>
            </div>
            <label class="followed-user-filter followed-user-filter--admin-only" id="followedUserFilterWrap" hidden>
              <span>Show</span>
              <select id="followedUserFilter" aria-label="Filter follows by user">
                <option value="self">My follows</option>
                <option value="all">All users</option>
              </select>
            </label>
          </div>
          <ul id="followedList" class="followed-grid" role="list"></ul>
          <p id="emptyState" class="followed-empty" hidden>Nothing here yet. Follow artists or playlists from Discover.</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/pages/following-page.js"></script>
  </body>
</html>
